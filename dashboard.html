<!DOCTYPE html>
<html>
<head>
    <title>🎯 AI Tutor Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#f0f2f5;min-height:100vh;}
        header{background:#007bff;color:white;padding:20px;text-align:center;}
        .container{max-width:1200px;margin:0 auto;padding:20px;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
        .card{background:white;padding:30px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
        .btn{background:#28a745;color:white;padding:15px 30px;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin:10px;}
        .btn:hover{background:#218838;}
        #logout{background:#dc3545;}
    </style>
</head>
<body>
    <header>
        <h1>🎯 AI Tutor Dashboard</h1>
        <p>Welcome back, <span id="studentName">Student</span>!</p>
        <button id="logout" class="btn">Logout</button>
    </header>
    
    <div class="container">
        <div class="stats-grid">
            <div class="card">
                <h3>📊 Your Stats</h3>
                <p>Accuracy: <strong id="accuracy">0%</strong></p>
                <p>Total Quizzes: <strong id="totalQuizzes">0</strong></p>
                <p>Avg Score: <strong id="avgScore">0</strong></p>
            </div>
            <div class="card">
                <h3>📝 Quick Actions</h3>
                <button class="btn" onclick="startQuiz('math')">🚀 Math Quiz</button>
                <button class="btn" onclick="startQuiz('physics')">⚛️ Physics Quiz</button>
                <button class="btn" onclick="startQuiz('chemistry')">🧪 Chemistry Quiz</button>
            </div>
        </div>
        
        <div class="card" style="margin-top:20px;">
            <h3>📈 Recent Quizzes</h3>
            <div id="recentQuizzes">No quizzes yet!</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://pdegwwddqpnjaranrvvh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZWd3d2RkcXBuamFyYW5ydnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODYxNDksImV4cCI6MjA4OTA2MjE0OX0.lg3cONONUcZu4dKpvF4B-z2-B9BNJOUWTl0H6wCtY6c';
        const { createClient } = supabase;
        const client = createClient(supabaseUrl, supabaseKey);

        async function loadDashboard() {
            const { data: { session } } = await client.auth.getSession();
            if(!session) {
                window.location.href = 'login.html';
                return;
            }

            // Get student data
            const { data: student } = await client
                .from('students')
                .select('*')
                .eq('user_id', session.user.id)
                .single();
                
            document.getElementById('studentName').textContent = student?.name || 'Student';
            document.getElementById('accuracy').textContent = student?.accuracy || 0 + '%';
            document.getElementById('totalQuizzes').textContent = student?.total_quizzes || 0;
            document.getElementById('avgScore').textContent = student?.avg_score || 0;
        }

        document.getElementById('logout').onclick = async () => {
            await client.auth.signOut();
            window.location.href = 'login.html';
        }

        function startQuiz(subject) {
            alert(`Starting ${subject} quiz! (Coming soon)`);
        }

        // Load dashboard
        loadDashboard();
    </script>
</body>
</html>
