<!DOCTYPE html>
<html>
<head>
    <title>📊 Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;}
        header{background:linear-gradient(135deg,#4a6cf7,#5a67d8);color:white;padding:25px;text-align:center;box-shadow:0 25px 70px rgba(74,108,247,0.4);}
        .container{max-width:1200px;margin:20px auto;padding:20px;}
        .dashboard{background:linear-gradient(145deg,rgba(255,255,255,0.95),rgba(255,255,255,0.85));backdrop-filter:blur(25px);padding:40px;border-radius:35px;box-shadow:0 35px 120px rgba(0,0,0,0.25);height:85vh;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;margin-bottom:30px;}
        .stat-card{background:linear-gradient(135deg,#ff6b6b,#feca57);color:white;padding:40px;border-radius:30px;text-align:center;box-shadow:0 20px 80px rgba(255,107,107,0.4);}
        .stat-value{font-size:45px;font-weight:900;margin-bottom:15px;}
        .main-grid{display:grid;grid-template-columns:2fr 1fr;gap:30px;height:calc(100% - 140px);}
        .quick-actions{display:grid;gap:20px;}
        .action-btn{padding:25px;background:linear-gradient(135deg,#4a6cf7,#5a67d8);color:white;border:none;border-radius:25px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 15px 50px rgba(74,108,247,0.4);transition:all 0.3s;}
        .action-btn:hover{transform:translateY(-8px);box-shadow:0 25px 70px rgba(74,108,247,0.6);}
        .recent-activity{background:linear-gradient(145deg,rgba(248,249,250,0.9),rgba(255,255,255,0.8));backdrop-filter:blur(20px);padding:30px;border-radius:25px;height:100%;}
        h1{font-size:3.5em;text-shadow:0 6px 25px rgba(0,0,0,0.3);}
        h3{font-size:2em;margin-bottom:20px;}
    </style>
</head>
<body>
    <header>
        <h1>📊 Your Dashboard</h1>
        <p style="font-size:1.2em;opacity:0.95;">Welcome back! Continue your learning journey</p>
    </header>
    
    <div class="container">
        <div class="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="score">87%</div>
                    <div>Overall Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="level">Expert</div>
                    <div>Current Level</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="streak">7</div>
                    <div>Day Streak</div>
                </div>
            </div>
            
            <div class="main-grid">
                <div class="quick-actions">
                    <h3>🚀 Quick Actions</h3>
                    <button class="action-btn" onclick="window.location.href='tutor.html'">🤖 Ask AI Tutor</button>
                    <button class="action-btn" onclick="window.location.href='quiz.html'" style="background:linear-gradient(135deg,#ff6b6b,#feca57);">📝 Practice Quiz</button>
                    <button class="action-btn" onclick="alert('Coming soon!')">📚 Mock Tests</button>
                    <button class="action-btn" onclick="alert('Coming soon!')">🎯 Exam Analytics</button>
                </div>
                
                <div class="recent-activity">
                    <h3>📈 Recent Activity</h3>
                    <div>DSA Quiz - 95% ✅</div>
                    <div>Binary Search doubts - Solved</div>
                    <div>JEE Programming test - 88%</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
