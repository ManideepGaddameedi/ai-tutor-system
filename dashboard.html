<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - AI Tutor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#333;}
        header{background:#4a6cf7;color:white;padding:20px;text-align:center;}
        .container{max-width:1000px;margin:20px auto;padding:20px;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:20px 0;}
        .stat-card{background:white;padding:30px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        .stat-card h3{font-size:2.5em;color:#4a6cf7;}
        .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;}
        .card{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;}
        .btn{padding:15px;background:#4a6cf7;color:white;border:none;border-radius:10px;cursor:pointer;width:100%;font-size:16px;margin:10px 0;font-weight:bold;}
        .btn:hover{background:#3b55d0;}
        .btn.danger{background:#e63946;}
        @media(max-width:768px){.cards{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <header>
        <h1>Dashboard</h1>
        <p id="welcomeText">Welcome!</p>
    </header>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3 id="quizScore">0%</h3>
                <p>Quiz Score</p>
            </div>
            <div class="stat-card">
                <h3 id="userLevel">Beginner</h3>
                <p>Level</p>
            </div>
        </div>
        <div class="cards">
            <div class="card">
                <h3>📝 Skill Quiz</h3>
                <p>Test your knowledge</p>
                <a href="quiz.html"><button class="btn">Take Quiz</button></a>
            </div>
            <div class="card">
                <h3>💬 AI Tutor</h3>
                <p>Ask questions</p>
                <a href="tutor.html"><button class="btn">Chat Now</button></a>
            </div>
        </div>
        <button class="btn danger" onclick="logout()" style="width:200px;margin:0 auto;display:block;">Logout</button>
    </div>
    <script>
    window.onload = function(){
        var name = localStorage.getItem("userName");
        var welcome = document.getElementById("welcomeText");
        if(welcome && name) welcome.innerHTML = "Welcome, " + name + "!";
        
        var score = localStorage.getItem("quizScore") || 0;
        document.getElementById("quizScore").innerHTML = score + "%";
        
        var level = localStorage.getItem("userLevel") || "Beginner";
        document.getElementById("userLevel").innerHTML = level;
    }
    
    function logout(){
        localStorage.clear();
        window.location.href = "index.html";
    }
    </script>
</body>
</html>
