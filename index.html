<!DOCTYPE html>
<html>
<head>
    <title>🎯 AI Tutor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        
        .login-container{
            background:linear-gradient(145deg,rgba(255,255,255,0.95),rgba(255,255,255,0.85));
            backdrop-filter:blur(25px);
            padding:60px 40px;
            border-radius:30px;
            box-shadow:0 30px 100px rgba(0,0,0,0.3);
            max-width:450px;
            width:100%;
            text-align:center;
        }
        
        .logo{font-size:3.5em;margin-bottom:20px;background:linear-gradient(135deg,#4a6cf7,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        h1{font-size:2.2em;color:#2c3e50;margin-bottom:15px;}
        .tagline{font-size:1.3em;color:#666;margin-bottom:30px;}
        .login-btn{display:inline-block;padding:22px 50px;background:linear-gradient(135deg,#48bb78,#68d391);color:white;text-decoration:none;border-radius:25px;font-size:18px;font-weight:800;box-shadow:0 15px 45px rgba(72,187,120,0.4);transition:all 0.3s;margin:25px 0;}
        .login-btn:hover{transform:translateY(-3px);box-shadow:0 20px 55px rgba(72,187,120,0.6);}
        
        /* HIDDEN - NEVER SHOWS */
        .services-screen{display:none !important;}
    </style>
</head>
<body>
    <!-- ONLY LOGIN SCREEN - FOREVER -->
    <div class="login-container">
        <div class="logo">🎯</div>
        <h1>AI Tutor Master</h1>
        <p class="tagline">JEE • NEET • EAPCET • GATE • Placements</p>
        <p style="color:#999;margin-bottom:30px;">Login to start your learning journey</p>
        <a href="login.html" class="login-btn">✨ Login / Register FREE</a>
        <p style="color:#999;margin-top:30px;font-size:14px;">Join 10K+ students mastering exams</p>
    </div>

    <!-- NEVER SHOWS - HIDDEN FOREVER -->
    <div id="servicesScreen" class="services-screen" style="display:none;">
        <!-- Empty - no services visible -->
    </div>
</body>
</html>
