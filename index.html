<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 AI Tutor - Login Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 3.5em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4a6cf7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2em;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .tagline {
            color: #666;
            font-size: 1.3em;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .services-locked {
            background: linear-gradient(135deg, rgba(74, 108, 247, 0.1), rgba(255, 107, 107, 0.1));
            border: 2px solid rgba(74, 108, 247, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin: 30px 0;
            color: #4a6cf7;
        }

        .service-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .service-tag {
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .login-btn {
            display: inline-block;
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #48bb78, #68d391);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 15px 45px rgba(72, 187, 120, 0.4);
            transition: all 0.3s ease;
            margin: 25px 0;
            border: none;
            cursor: pointer;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 55px rgba(72, 187, 120, 0.6);
        }

        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .feature {
            color: #666;
            font-size: 15px;
            margin-bottom: 8px;
        }

        /* HIDDEN SERVICES SECTION */
        .services-section {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- ONLY LOGIN SCREEN - NO SERVICES VISIBLE -->
    <div class="login-container">
        <div class="logo">🎯</div>
        <h1>AI Tutor Master</h1>
        <p class="tagline">
            JEE • NEET • EAPCET • GATE • Placements
        </p>

        <div class="services-locked">
            <div style="font-size: 1.2em; font-weight: 700; margin-bottom: 15px;">
                🔒 All Services Locked
            </div>
            <div style="font-size: 1em; opacity: 0.9;">
                Login to unlock personalized learning
            </div>
        </div>

        <div class="service-tags">
            <span class="service-tag">🤖 AI Tutor Bot</span>
            <span class="service-tag">📝 Practice Quiz</span>
            <span class="service-tag">📊 Dashboard</span>
            <span class="service-tag">📈 Progress</span>
        </div>

        <a href="login.html" class="login-btn">
            ✨ Login / Register FREE
        </a>

        <div class="features">
            <div class="feature">✅ Personalized progress tracking</div>
            <div class="feature">✅ 24/7 AI doubt solving</div>
            <div class="feature">✅ Exam-focused content</div>
        </div>
    </div>

    <!-- HIDDEN SERVICES (ONLY AFTER LOGIN) -->
    <div id="servicesSection" class="services-section">
        <!-- This stays hidden forever for guests -->
    </div>

    <script>
        // Check login status
        function checkLogin() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if (isLoggedIn) {
                // Show services (you can add redirect)
                window.location.href = 'dashboard.html';
            }
            // Else keep login screen only
        }

        // Run on load
        window.addEventListener('load', checkLogin);
    </script>
</body>
</html>
