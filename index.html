<!DOCTYPE html>
<html>
<head>
    <title>AI Tutor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#333;}
        .container{max-width:1200px;margin:0 auto;padding:20px;display:flex;justify-content:center;align-items:center;min-height:80vh;}
        .card{background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.1);width:400px;text-align:center;}
        .btn{padding:15px;background:#4a6cf7;color:white;border:none;border-radius:10px;cursor:pointer;width:100%;font-size:16px;margin:10px 0;font-weight:bold;}
        .btn:hover{background:#3b55d0;}
        .btn.secondary{background:#6c757d;}
        header{background:#4a6cf7;color:white;padding:20px;text-align:center;}
    </style>
</head>
<body>
    <header><h1>🎓 AI Tutor</h1><p>Personalized Learning Platform</p></header>
    <div class="container">
        <div class="card">
            <h2>Welcome!</h2>
            <p>AI-powered adaptive learning</p>
            <a href="register.html"><button class="btn">Create Account</button></a>
            <a href="login.html"><button class="btn secondary">Login</button></a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
