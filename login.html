<!DOCTYPE html>
<html>
<head>
    <title>✨ AI Tutor Login - DEBUG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .login-container{background:linear-gradient(145deg,rgba(255,255,255,0.95),rgba(255,255,255,0.85));backdrop-filter:blur(25px);padding:50px;border-radius:30px;box-shadow:0 30px 100px rgba(0,0,0,0.3);max-width:450px;width:100%;text-align:center;}
        .logo{font-size:3em;margin-bottom:20px;background:linear-gradient(135deg,#4a6cf7,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        h2{font-size:2.2em;color:#2c3e50;margin-bottom:30px;}
        input{width:100%;padding:18px;border:2px solid rgba(0,0,0,0.1);border-radius:15px;font-size:16px;margin-bottom:20px;transition:all 0.3s;}
        input:focus{outline:none;border-color:#4a6cf7;box-shadow:0 0 0 3px rgba(74,108,247,0.1);}
        .btn{width:100%;padding:20px;border:none;border-radius:15px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 15px 45px rgba(0,0,0,0.2);transition:all 0.3s;margin:10px 0;color:white;}
        .login-btn{background:linear-gradient(135deg,#48bb78,#68d391);}
        .register-btn{background:linear-gradient(135deg,#4a6cf7,#5a67d8);}
        .btn:hover{transform:translateY(-3px);box-shadow:0 20px 55px rgba(0,0,0,0.3);}
        .status{margin-top:20px;padding:15px;border-radius:10px;display:none;font-family:monospace;font-size:14px;}
        .error{background:#fee;color:#c53030;}
        .success{background:#c6f6d5;color:#22543d;}
        .debug{background:#ffeaa7;color:#2d3436;border:2px solid #fdcb6e;padding:15px;margin:10px 0;border-radius:10px;font-family:monospace;}
        #debugConsole{max-height:200px;overflow-y:auto;font-size:12px;}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🎯</div>
        <h2>AI Tutor Login</h2>
        
        <div class="debug">
            <strong>🔧 DEBUG MODE</strong><br>
            Supabase URL: pdegwwddqpnjaranrvvh.supabase.co ✓<br>
            Test with: test@example.com / password123
        </div>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="test@example.com" value="test@example.com">
            <input type="password" id="password" placeholder="password123" value="password123">
            <button type="submit" class="btn login-btn">🚀 Login</button>
        </form>
        
        <button id="registerBtn" class="btn register-btn">📝 Register</button>
        <button id="testBtn" class="btn" style="background:#ff6b6b;margin-top:10px;">🧪 Test Connection</button>
        
        <div id="status" class="status"></div>
        <div id="debugConsole"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // DEBUG LOGGING
        function log(msg) {
            const console = document.getElementById('debugConsole');
            console.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            console.scrollTop = console.scrollHeight;
        }
        
        log('🔄 Initializing Supabase client...');
        
        const supabase = supabase.createClient(
            'https://pdegwwddqpnjaranrvvh.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZWd3d2RkcXBuamFyYW5ydnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODYxNDksImV4cCI6MjA4OTA2MjE0OX0.lg3cONONUcZu4dKpvF4B-z2-B9BNJOUWTl0H6wCtY6c'
        );
        
        log('✅ Supabase client created');
        
        // TEST CONNECTION
        document.getElementById('testBtn').addEventListener('click', async () => {
            log('🧪 Testing connection...');
            try {
                const { data, error } = await supabase.from('students').select('count').limit(1);
                if(error) throw error;
                log('✅ Database connection OK: ' + JSON.stringify(data));
            } catch(e) {
                log('❌ DB Error: ' + e.message);
            }
        });
        
        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            log(`🔐 Login attempt: ${email}`);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email, password
                });
                
                if(error) {
                    log('❌ Login error: ' + error.message);
                    status.textContent = `❌ ${error.message}`;
                    status.className = 'status error';
                    status.style.display = 'block';
                } else {
                    log('✅ Login SUCCESS: ' + data.user.email);
                    status.textContent = '✅ Login successful! Redirecting...';
                    status.className = 'status success';
                    status.style.display = 'block';
                    
                    // Create student profile
                    log('👤 Creating student profile...');
                    const { error: profileError } = await supabase.from('students').insert({
                        user_id: data.user.id,
                        name: data.user.email.split('@')[0],
                        email: data.user.email,
                        exams: ['JEE', 'NEET']
                    });
                    
                    if(profileError) log('⚠️ Profile error (might exist): ' + profileError.message);
                    
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                }
            } catch(e) {
                log('💥 Unexpected error: ' + e);
                status.textContent = '💥 Unexpected error';
                status.className = 'status error';
                status.style.display = 'block';
            }
        });
        
        // REGISTER
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            log(`📝 Register attempt: ${email}`);
            
            const { error } = await supabase.auth.signUp({ email, password });
            
            if(error) {
                log('❌ Register error: ' + error.message);
                status.textContent = `❌ ${error.message}`;
                status.className = 'status error';
                status.style.display = 'block';
            } else {
                log('✅ Register sent - check email!');
                status.textContent = '✅ Check your email for verification!';
                status.className = 'status success';
                status.style.display = 'block';
            }
        });
        
        log('🎯 Ready! Click "Test Connection" first!');
    </script>
</body>
</html>
