<!DOCTYPE html>
<html>
<head>
    <title>🔐 AI Tutor Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .login-container{max-width:450px;width:90%;padding:20px;}
        .login-card{background:linear-gradient(145deg,rgba(255,255,255,0.95),rgba(255,255,255,0.85));backdrop-filter:blur(30px);padding:60px 50px;border-radius:40px;box-shadow:0 40px 140px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.3);}
        h1{text-align:center;font-size:3.5em;color:#2c3e50;margin-bottom:10px;text-shadow:0 4px 20px rgba(0,0,0,0.1);}
        .subtitle{text-align:center;color:#666;font-size:1.2em;margin-bottom:40px;}
        input{display:block;width:100%;padding:22px;margin-bottom:25px;border:2px solid rgba(255,255,255,0.3);border-radius:30px;font-size:17px;background:rgba(255,255,255,0.9);backdrop-filter:blur(15px);box-shadow:0 10px 40px rgba(0,0,0,0.1);transition:all 0.3s;}
        input:focus{outline:none;border-color:#4a6cf7;transform:translateY(-3px);box-shadow:0 15px 50px rgba(74,108,247,0.25);}
        .btn{width:100%;padding:22px;background:linear-gradient(135deg,#4a6cf7,#5a67d8);color:white;border:none;border-radius:30px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 15px 50px rgba(74,108,247,0.4);transition:all 0.3s;margin:10px 0;}
        .btn:hover{transform:translateY(-8px);box-shadow:0 25px 70px rgba(74,108,247,0.6);}
        .toggle{text-align:center;margin:30px 0;}
        .toggle span{color:#4a6cf7;cursor:pointer;font-weight:700;font-size:16px;text-decoration:underline;}
        .success-msg{text-align:center;color:#48bb78;font-size:1.3em;font-weight:800;margin:25px 0;padding:20px;background:linear-gradient(135deg,rgba(72,187,120,0.1),rgba(104,211,145,0.1));border-radius:20px;border:2px solid rgba(72,187,120,0.3);display:none;}
        .error-msg{text-align:center;color:#e74c3c;font-size:1.1em;font-weight:600;margin:15px 0;padding:15px;background:linear-gradient(135deg,rgba(231,76,60,0.1),rgba(231,76,60,0.1));border-radius:15px;border:2px solid rgba(231,76,60,0.3);display:none;}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🔐 Welcome Back</h1>
            <p class="subtitle">Continue your learning journey</p>
            
            <!-- LOGIN FORM -->
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="✉️ Email" required>
                <input type="password" id="loginPassword" placeholder="🔒 Password" required>
                <button type="submit" class="btn">Enter Learning Dashboard</button>
            </form>
            
            <!-- REGISTER FORM (HIDDEN) -->
            <form id="registerForm" style="display:none;">
                <input type="text" id="regName" placeholder="👤 Full Name" required>
                <input type="email" id="regEmail" placeholder="✉️ Email" required>
                <input type="password" id="regPassword" placeholder="🔒 Password (8+ chars)" required>
                <button type="submit" class="btn">Create My Account</button>
            </form>
            
            <!-- TOGGLE -->
            <div class="toggle">
                <span id="toggleText" onclick="toggleForm()">Don't have account? Create one</span>
            </div>
            
            <!-- MESSAGES -->
            <div id="successMsg" class="success-msg"></div>
            <div id="errorMsg" class="error-msg"></div>
            
            <!-- ONLY HOME LINK (NO Bot/Quiz) -->
            <div style="text-align:center;margin-top:40px;">
                <a href="index.html" style="color:#666;font-size:16px;text-decoration:none;">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;
        
        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Simulate login check
            if(email && password.length >= 6) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', email.split('@')[0]);
                showSuccess('✅ Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            } else {
                showError('❌ Please enter valid email & password');
            }
        });
        
        // REGISTER
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if(password.length < 6) {
                showError('❌ Password must be 6+ characters');
                return;
            }
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', name || email.split('@')[0]);
            showSuccess('✅ Account created! Welcome to AI Tutor!');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
        
        function toggleForm() {
            isLogin = !isLogin;
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const toggleText = document.getElementById('toggleText');
            
            if(isLogin) {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggleText.textContent = "Don't have account? Create one";
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggleText.textContent = "Already have account? Login";
            }
            
            hideMessages();
        }
        
        function showSuccess(msg) {
            const successEl = document.getElementById('successMsg');
            const errorEl = document.getElementById('errorMsg');
            successEl.textContent = msg;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }
        
        function showError(msg) {
            const successEl = document.getElementById('successMsg');
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>
</body>
</html>
