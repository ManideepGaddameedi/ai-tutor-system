<!DOCTYPE html>
<html>
<head>
    <title>AI Tutor Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .container{background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);max-width:400px;width:100%;text-align:center;}
        h1{font-size:28px;color:#333;margin-bottom:10px;}
        input{width:100%;padding:15px;margin:10px 0;border:1px solid #ddd;border-radius:10px;font-size:16px;box-sizing:border-box;}
        .btn{width:100%;padding:15px;margin:10px 0;background:#007bff;color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;}
        .btn:hover{background:#0056b3;}
        .btn-success{background:#28a745;}
        .btn-success:hover{background:#218838;}
        .error{color:#dc3545;margin:10px 0;font-size:14px;}
        .success{color:#155724;margin:10px 0;font-size:14px;background:#d4edda;padding:10px;border-radius:5px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 AI Tutor</h1>
        <p>Register or Login</p>
        
        <input type="email" id="email" placeholder="Email" value="manideep@test.com">
        <input type="password" id="password" placeholder="Password" value="password123">
        
        <button onclick="register()" class="btn btn-success">📝 CREATE ACCOUNT</button>
        <button onclick="login()" class="btn">🚀 LOGIN</button>
        
        <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://pdegwwddqpnjaranrvvh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZWd3d2RkcXBuamFyYW5ydnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODYxNDksImV4cCI6MjA4OTA2MjE0OX0.lg3cONONUcZu4dKpvF4B-z2-B9BNJOUWTl0H6wCtY6c';
        
        const { createClient } = supabase;
        const client = createClient(supabaseUrl, supabaseKey);

        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            message.innerHTML = 'Creating account...';
            message.className = '';
            
            try {
                const { data, error } = await client.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                message.innerHTML = '✅ Account created! Now click LOGIN';
                message.className = 'success';
                
            } catch (error) {
                message.innerHTML = '❌ ' + error.message;
                message.className = 'error';
                console.error('Register error:', error);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            message.innerHTML = 'Logging in...';
            message.className = '';
            
            try {
                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                message.innerHTML = '✅ Success! Redirecting...';
                message.className = 'success';
                
                // Save login state
                localStorage.setItem('token', data.session.access_token);
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                message.innerHTML = '❌ ' + error.message;
                message.className = 'error';
                console.error('Login error:', error);
            }
        }
    </script>
</body>
</html>
