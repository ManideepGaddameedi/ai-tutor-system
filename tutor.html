<!DOCTYPE html>
<html>
<head>
    <title>🤖 AI Programming Tutor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#333;}
        header{background:linear-gradient(135deg,#4a6cf7,#5a67d8);color:white;padding:25px;text-align:center;}
        .container{max-width:900px;margin:20px auto;padding:20px;}
        .card{background:white;padding:35px;border-radius:25px;box-shadow:0 25px 70px rgba(0,0,0,0.15);height:80vh;display:flex;flex-direction:column;}
        #chatbox{flex:1;overflow-y:auto;padding:25px;background:#f8f9fa;border-radius:20px;margin-bottom:20px;max-height:500px;}
        .message{margin:12px 0;padding:20px;border-radius:22px;box-shadow:0 4px 20px rgba(0,0,0,0.1);line-height:1.7;}
        .user{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-left:5px solid #4a6cf7;max-width:85%;}
        .ai{background:linear-gradient(135deg,#2c3e50,#34495e);color:#ffffff;border-left:5px solid #ffd700;}
        .chat-input{display:flex;gap:15px;}
        input{flex:1;padding:20px;border:2px solid #e1e5e9;border-radius:30px;font-size:16px;box-shadow:0 4px 15px rgba(0,0,0,0.08);}
        input:focus{outline:none;border-color:#4a6cf7;box-shadow:0 0 0 4px rgba(74,108,247,0.15);}
        .btn{padding:20px 35px;background:linear-gradient(135deg,#4a6cf7,#5a67d8);color:white;border:none;border-radius:30px;cursor:pointer;font-size:16px;font-weight:600;box-shadow:0 6px 20px rgba(74,108,247,0.3);}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(74,108,247,0.4);}
        code{background:#1e293b !important;color:#e9ecef !important;padding:6px 12px;border-radius:8px;font-family:monospace;font-size:14px;}
        h1{font-size:2.5em;}
    </style>
</head>
<body>
    <header>
        <h1>🤖 AI Programming Tutor</h1>
        <p style="opacity:0.9;">Ask JEE/NEET/EAPCET/GATE/Placement doubts - Go to <strong>Quiz Page</strong> for profile setup</p>
    </header>
    
    <div class="container">
        <div class="card">
            <div id="chatbox">
                <div class="message ai">
                    <strong>🤖 AI Tutor:</strong> Hi! Ask me <strong>ANY programming doubt</strong> - C, Python, DSA, OOP, algorithms, interview questions. Navigate to <strong>Quiz Page</strong> to setup your Grade/Exams for personalized quizzes! 🚀
                </div>
            </div>
            
            <div class="chat-input">
                <input id="question" type="text" placeholder="Ask: 'binary search JEE', 'linked list GATE', 'loops EAPCET'..." />
                <button class="btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('question').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            let input = document.getElementById('question');
            let chatbox = document.getElementById('chatbox');
            let q = input.value.trim();
            
            if(!q) return;
            
            chatbox.innerHTML += `<div class="message user"><strong>You:</strong> ${q}</div>`;
            input.value = '';
            chatbox.scrollTop = chatbox.scrollHeight;
            
            chatbox.innerHTML += `<div class="message ai" id="typing"><strong>🤖 AI Tutor:</strong> <em>Thinking...</em></div>`;
            chatbox.scrollTop = chatbox.scrollHeight;
            
            setTimeout(() => {
                document.getElementById('typing').remove();
                let response = getResponse(q);
                chatbox.innerHTML += `<div class="message ai"><strong>🤖 AI Tutor:</strong> ${response}</div>`;
                chatbox.scrollTop = chatbox.scrollHeight;
            }, 1000);
        }

        function getResponse(q) {
            let question = q.toLowerCase();
            
            if(question.includes('binary search') || question.includes('search')) {
                return `🔍 <strong>Binary Search O(log n)</strong><br>
                <code>int binarySearch(int arr[], int n, int x) {
    int l = 0, r = n-1;
    while(l <= r) {
        int m = l + (r-l)/2;
        if(arr[m] == x) return m;
        if(arr[m] < x) l = m+1;
        else r = m-1;
    }
    return -1;
}</code>`;
            }
            
            if(question.includes('loop') || question.includes('for')) {
                return `🔄 <strong>All Loops</strong><br>
                <code>for(int i=0; i<10; i++) {}           // Definite
while(i<10) {i++;}                      // Indefinite
do {i++;} while(i<10);                  // Do-while</code>`;
            }
            
            return `Great question "${q}"! Try: "binary search", "loops", "linked list", "OOP", "bubble sort", "stack", "tree"`;
        }
    </script>
</body>
</html>
